name: Publish Tessl Tile

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tesslio/publish@main
        with:
          path: schema-registry-tile
          token: ${{ secrets.TESSL_API_KEY }}
