name: Publish Tessl Tile

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tesslio/publish@v1
        with:
          path: schema-registry-tile
          api-key: ${{ secrets.TESSL_API_KEY }}
